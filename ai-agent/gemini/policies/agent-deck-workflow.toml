[[rule]]
name = "allow_agent_deck_cli"
enabled = true
decision = "allow"
toolName = "run_shell_command"
commandPrefix = ["agent-deck"]
priority = 950
modes = ["default", "autoEdit", "yolo"]

[[rule]]
name = "allow_waypost_cli"
enabled = true
decision = "allow"
toolName = "run_shell_command"
commandPrefix = ["waypost"]
priority = 950
modes = ["default", "autoEdit", "yolo"]

[[rule]]
name = "allow_waypost_mcp"
enabled = true
decision = "allow"
toolName = "*"
mcpName = "waypost"
priority = 950
modes = ["default", "autoEdit", "yolo"]

[[rule]]
name = "allow_agent_deck_workflow_dispatch"
enabled = true
decision = "allow"
toolName = "run_shell_command"
commandPrefix = ["~/.local/bin/adwf-send-and-wake"]
priority = 950
modes = ["default", "autoEdit", "yolo"]
