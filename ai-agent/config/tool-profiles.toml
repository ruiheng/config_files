version = 1

[roles]
planner = "planner_default"
coder = "coder_default"
reviewer = "reviewer_default"
architect = "architect_default"
browser_tester = "browser_tester_default"
roundtable_participant = "roundtable_participant_default"

[profiles.planner_default]
strategy = "ordered"
candidates = [
  "codex --model gpt-5.6-terra -c model_reasoning_effort=max --ask-for-approval on-request",
  "codex --model gpt-5.5 -c model_reasoning_effort=medium --ask-for-approval on-request",
]

[profiles.coder_default]
strategy = "ordered"
candidates = [
  "codex --model gpt-5.6-terra -c model_reasoning_effort=max --ask-for-approval on-request",
  "codex --model gpt-5.5 -c model_reasoning_effort=medium --ask-for-approval on-request",
  "claude --model sonnet --permission-mode acceptEdits",
]

[profiles.reviewer_default]
strategy = "ordered"
candidates = [
  "codex --model gpt-5.6-sol -c model_reasoning_effort=xhigh --ask-for-approval on-request",
  "codex --model gpt-5.5 -c model_reasoning_effort=xhigh --ask-for-approval on-request",
  "claude --model sonnet --permission-mode acceptEdits",
]

[profiles.architect_default]
strategy = "ordered"
candidates = [
  "codex --model gpt-5.6-sol -c model_reasoning_effort=xhigh --ask-for-approval on-request",
  "codex --model gpt-5.5 -c model_reasoning_effort=medium --ask-for-approval on-request",
]

[profiles.browser_tester_default]
strategy = "ordered"
candidates = [
  "codex --model gpt-5.6-terra -c model_reasoning_effort=medium",
  "codex -m gpt-5.5 -c model_reasoning_effort=low",
]

[profiles.roundtable_participant_default]
strategy = "ordered"
candidates = [
  "codex --model gpt-5.6-sol -c model_reasoning_effort=xhigh --ask-for-approval on-request",
  "codex --model gpt-5.5 -c model_reasoning_effort=medium --ask-for-approval on-request",
]
